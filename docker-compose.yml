version: "3.9"

services:
  # ============ LLM 服务（Python） ============
  llm_service:
    build: ./llm_service
    container_name: rap-llm
    ports:
      - "8000:8000"
    env_file:
      - ./llm_service/.env.example
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./llm_service/.chroma:/app/.chroma
      - llm_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============ 后端 API 网关（Node.js） ============
  backend:
    build: ./backend
    container_name: rap-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - LLM_SERVICE_URL=http://llm_service:8000
      - FRONTEND_URL=http://localhost:5173
      - NODE_ENV=development
    depends_on:
      llm_service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ 前端（React + Nginx） ============
  frontend:
    build: ./frontend
    container_name: rap-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  llm_cache:
    driver: local
